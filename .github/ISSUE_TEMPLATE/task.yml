name: BurnLens task

description: Create one BurnLens milestone or exception checkpoint contract for issue-first, prompt-assisted repository work.

title: "P#O#-T## "

body:
  - type: markdown
    attributes:
      value: |
        Use this form for one reviewable BurnLens milestone or exception checkpoint. Related evidence units may accumulate inside a milestone under `docs/governance/CHECKPOINT_POLICY.md`.

        Start from `docs/workflows/PROMPT_TO_REPO_SOP.md`, instantiate the canonical capsule in `templates/CODEX_TASK_PACKET.md`, and keep work inside the allowed-file contract.

        BurnLens is an experimental portfolio-first computer vision and GEOINT project. This form does not authorize data, imagery, AOIs, labels, masks, baselines, models, metrics, runs, maps, screenshots, demos, public claims, repository settings, tags, or GitHub Releases unless the task explicitly names the work and its governing gates are satisfied.

  - type: input
    id: task_id
    attributes:
      label: Task ID
      description: Retain the existing task identifier pattern; use the checkpoint-class field to distinguish milestone and exception work.
      placeholder: P#O#-T## or BL-GOV-###
    validations:
      required: true

  - type: input
    id: parent_issue
    attributes:
      label: Parent issue
      description: Link the objective or workstream parent. Ordinary task pull requests must not close it.
      placeholder: "#NNN"
    validations:
      required: true

  - type: textarea
    id: purpose
    attributes:
      label: Task purpose
      description: State the bounded result this task must produce and why it is needed.
      placeholder: Describe the task outcome in one to three sentences.
    validations:
      required: true

  - type: dropdown
    id: checkpoint_class
    attributes:
      label: Checkpoint class
      description: Evidence units register inside a milestone and do not normally open separate issues. Choose exception only for a valid policy trigger.
      options:
        - "Milestone checkpoint"
        - "Exception checkpoint"
    validations:
      required: true

  - type: textarea
    id: milestone_exit
    attributes:
      label: Milestone outcome and exit condition
      description: State the coherent project-truth change and the observable condition for ship, remediation, fallback, deferral, or stop.
      placeholder: |
        Outcome: ...
        Entry condition: ...
        Exit condition: ...
    validations:
      required: true

  - type: textarea
    id: evidence_units
    attributes:
      label: Evidence-unit roster and retention rule
      description: List initial unit IDs or the registration rule. Require immutable identities, hashes where bytes exist, gates, dispositions, and preservation of failed or superseded units.
      placeholder: |
        - UNIT-001: purpose and required gates
        - Later units may be registered only when ...
        - Failed, superseded, excluded, and deferred units remain in ...
    validations:
      required: true

  - type: textarea
    id: exception_trigger
    attributes:
      label: Exception trigger or non-applicability
      description: For an exception, name the licensing, security, custody, rollback, stop-condition, or urgent-correctness trigger. For a milestone, enter "Not applicable".
      placeholder: Not applicable
    validations:
      required: true

  - type: input
    id: branch
    attributes:
      label: Intended branch
      description: Use the compact branch pattern from the governing workflow.
      placeholder: p#o#t##b
    validations:
      required: true

  - type: input
    id: base
    attributes:
      label: Base branch or ref
      description: Use current main unless an explicit dependency requires another base.
      value: main
    validations:
      required: true

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies
      description: List required issues, pull requests, commits, or artifacts. Enter "None" when the task is independent.
      placeholder: |
        - #NNN or PR #NNN
        - Required merged artifact
    validations:
      required: true

  - type: textarea
    id: primary_artifacts
    attributes:
      label: Primary artifacts
      description: List the exact primary repository paths this task creates or changes.
      placeholder: |
        - path/to/primary-artifact
    validations:
      required: true

  - type: textarea
    id: supporting_artifacts
    attributes:
      label: Supporting artifacts
      description: List adjacent records or status files allowed by the task. Enter "None" when not applicable.
      placeholder: |
        - path/to/supporting-record
    validations:
      required: true

  - type: textarea
    id: allowed_files
    attributes:
      label: Allowed file changes
      description: List exact files or authorized path families. Register in-outcome units before editing; a materially different outcome or high-risk scope requires an issue revision or separate checkpoint.
      placeholder: |
        path/to/allowed-file-1
        path/to/allowed-file-2
    validations:
      required: true

  - type: textarea
    id: forbidden_work
    attributes:
      label: Forbidden work and governing references
      description: Name the governing boundary files and any task-specific exclusions. Do not copy long boundary language when a precise path reference is sufficient.
      placeholder: |
        Follow AGENTS.md and the task-specific controls.
        Do not create or authorize ...
    validations:
      required: true

  - type: checkboxes
    id: tier_zero
    attributes:
      label: Tier 0 context acknowledgement
      description: Tier 0 is always loaded or summarized before repository work.
      options:
        - label: I will load or summarize the Tier 0 artifacts listed in `docs/workflows/PROMPT_TO_REPO_SOP.md`.
          required: true

  - type: checkboxes
    id: tier_one
    attributes:
      label: Relevant Tier 1 context
      description: Select only the task-specific control groups that apply. Exact paths belong in the task capsule.
      options:
        - label: GitHub workflow, issue, pull-request, review, or prompt-log controls
        - label: Computer-vision task or model-direction controls
        - label: Source, AOI, CRS, provenance, or run-package controls
        - label: Versioning, tag, Release, or baseline controls
        - label: Claims, public copy, source-precedence, or use-boundary controls
        - label: Reproducibility or release-QA controls
        - label: Research-validation or current external-fact controls
        - label: Current objective or phase handoff controls

  - type: textarea
    id: tier_two
    attributes:
      label: Tier 2 use and justification
      description: Enter "Not used" by default. When historical material is necessary, list each exact artifact and explain why current Tier 0 and Tier 1 controls were insufficient.
      placeholder: Not used
    validations:
      required: true

  - type: dropdown
    id: research_required
    attributes:
      label: Research requirement
      description: Current technical, tooling, API, official, policy, legal, safety, source, dataset, model, or public-claim facts require fresh official or primary research after branch creation.
      options:
        - "Yes - fresh official or primary research is required"
        - "No - repository-internal verification is sufficient"
    validations:
      required: true

  - type: textarea
    id: research_plan
    attributes:
      label: Research plan or no-research rationale
      description: List the official or primary sources and claims to verify, or explain why merged repository evidence is sufficient.
      placeholder: |
        - Official source and claim to verify
        - Adopted decision expected from the check
    validations:
      required: true

  - type: dropdown
    id: prompt_assisted
    attributes:
      label: Prompt-assisted status
      description: State whether ChatGPT, Codex, or another prompt-assisted agent will materially create or change files.
      options:
        - "Yes - prompt-assisted file changes are planned"
        - "No - no prompt-assisted file changes are planned"
    validations:
      required: true

  - type: input
    id: prompt_log
    attributes:
      label: Prompt/build-log path or non-applicability reason
      description: Prompt-assisted file changes require a dated entry under records/prompt-build-log/. Otherwise provide the task-specific reason it is not applicable.
      placeholder: records/prompt-build-log/YYYY-MM-DD-task-id.md
    validations:
      required: true

  - type: textarea
    id: test_plan
    attributes:
      label: Test and check plan
      description: Name the exact commands or manual inspection methods that will apply. Every completed check must report its actual result.
      placeholder: |
        - Check name — command or inspection method
        - Diff review — compare branch with current main
    validations:
      required: true

  - type: textarea
    id: non_applicable_checks
    attributes:
      label: Checks not applicable or not planned
      description: Give a task-specific reason for each expected check that does not apply. Enter "None identified" when every expected check is planned.
      placeholder: Code tests are not applicable because ...
    validations:
      required: true

  - type: checkboxes
    id: review_gate
    attributes:
      label: Review separation and owner-decision gate
      options:
        - label: Author self-audit and author checkboxes will be treated as assertions, not independent approval or an owner decision.
          required: true
        - label: AI-assisted review, when used, will be labeled supplemental and will not fabricate owner evidence or authorize work outside this issue.
          required: true
        - label: Required owner yes/no/uncertain evidence or stop-condition direction will be recorded when applicable; routine merge uses the controlling goal's standing authority.
          required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define observable unit, milestone, boundary, and verification conditions that must be satisfied before merge.
      placeholder: |
        - [ ] Only allowed files changed.
        - [ ] Required research and verification are recorded.
        - [ ] The handoff is complete.
    validations:
      required: true

  - type: textarea
    id: handoff
    attributes:
      label: Handoff target
      description: State the next task, review, closeout, or synchronization action and the context it must use.
      placeholder: Proceed to the next registered milestone or evidence unit only after this exit condition and merge are verified.
    validations:
      required: true

  - type: input
    id: close_keyword
    attributes:
      label: Task-scoped pull-request close keyword
      description: Replace the placeholder with this task issue only. Closing keywords act when the pull request targets the default branch and is merged.
      value: "Closes #TASK_ISSUE"
    validations:
      required: true

  - type: checkboxes
    id: parent_guard
    attributes:
      label: Parent-issue and scope protection
      options:
        - label: The milestone or exception pull request will close only this checkpoint issue and will not close the parent issue.
          required: true
        - label: This issue does not configure or claim GitHub settings enforcement, required checks, CI, branch protection, rulesets, or approvals.
          required: true
        - label: A materially different outcome, phase result, use boundary, or high-risk source/data scope will stop before an unauthorized change and require an issue revision or separate checkpoint.
          required: true
